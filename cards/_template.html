<!doctype html>
<!--
  ═══════════ CARD PROVENANCE ═══════════
  name:      {{NAME}}
  season:    {{SEASON}} · card {{NUMBER}}
  flavor:    {{FLAVOR}}
  prompt:    {{PROMPT}}
  seed/sref: {{SEED}}
  ═══════════════════════════════════════
  A self-contained live foil work. No dependencies, no build.
  Tilt with pointer (desktop) or gyroscope (mobile — iOS asks permission on tap).
  Foil heat breathes with Ethereum gas; sparkle reseeds each block (graceful offline).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{NAME}} · S{{SEASON_NUM}} №{{NUMBER}}</title>
<style>
  :root{
    --px: 0; --py: 0;          /* tilt, -1..1 */
    --heat: .35;               /* eth gas → foil heat, 0..1 */
    --gold1:#f6e27a; --gold2:#8a6d1f; --gold3:#fff7c9;
    --ink:#0b0710;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    background: radial-gradient(120% 90% at 50% 0%, #1b0f2b 0%, var(--ink) 60%, #000 100%);
    display:grid; place-items:center; overflow:hidden;
    font-family: Georgia, 'Times New Roman', serif;
    -webkit-tap-highlight-color: transparent;
  }
  .scene{ perspective: 1100px; touch-action: none; }
  .card{
    position:relative;
    width:min(88vw, 62vh, 420px);
    aspect-ratio: 5/7;
    border-radius: 4.2% / 3%;
    transform: rotateY(calc(var(--px) * 13deg)) rotateX(calc(var(--py) * -13deg));
    transform-style: preserve-3d;
    background:
      linear-gradient(calc(120deg + var(--px)*40deg),
        var(--gold2) 0%, var(--gold1) 22%, var(--gold3) 38%,
        var(--gold1) 52%, var(--gold2) 70%, var(--gold1) 100%);
    box-shadow:
      0 30px 60px -18px rgba(0,0,0,.85),
      0 0 40px -10px rgba(246,226,122,.28),
      inset 0 0 2px 1px rgba(255,247,201,.7);
    user-select:none;
  }
  /* ─── ornate frame ─── */
  .bezel{
    position:absolute; inset: 2.6%;
    border-radius: 3% / 2.2%;
    background: var(--ink);
    box-shadow: inset 0 0 0 1.5px rgba(246,226,122,.85), inset 0 0 22px rgba(0,0,0,.9);
    overflow:hidden;
  }
  .corner{ position:absolute; width:17%; aspect-ratio:1; color:var(--gold1);
    filter: drop-shadow(0 0 3px rgba(246,226,122,.5)); z-index:6; pointer-events:none; }
  .corner svg{ width:100%; height:100%; display:block; }
  .c-tl{ top:3.6%; left:5%; } .c-tr{ top:3.6%; right:5%; transform:scaleX(-1); }
  .c-bl{ bottom:3.6%; left:5%; transform:scaleY(-1); } .c-br{ bottom:3.6%; right:5%; transform:scale(-1); }

  /* ─── art window ─── */
  .art{
    position:absolute; inset: 9% 7% 19% 7%;
    border-radius: 2.5%;
    overflow:hidden;
    background:#160d22;
    box-shadow: inset 0 0 0 1.5px rgba(246,226,122,.6), inset 0 0 30px rgba(0,0,0,.75);
  }
  .art > img, .art > svg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }

  /* ─── foil stack ─── */
  .foil,.glare,.glitter{ position:absolute; inset:0; border-radius:inherit; pointer-events:none; }
  .foil{
    z-index:3;
    background: repeating-linear-gradient(calc(115deg + var(--px)*10deg),
      hsl(283 75% 62%) 0%, hsl(2 78% 60%) 7%, hsl(53 95% 62%) 14%,
      hsl(93 75% 56%) 21%, hsl(176 75% 56%) 28%, hsl(228 75% 62%) 35%, hsl(283 75% 62%) 42%);
    background-size: 260% 260%;
    background-position: calc(50% + var(--px)*70%) calc(50% + var(--py)*70%);
    mix-blend-mode: color-dodge;
    opacity: calc(.16 + var(--heat)*.30);
    filter: brightness(.8) contrast(1.9)
            saturate(calc(.75 + var(--heat)*1.3))
            hue-rotate(calc(var(--heat)*55deg));
  }
  .glare{
    z-index:4;
    background: radial-gradient(farthest-corner circle at
        calc(50% + var(--px)*55%) calc(50% + var(--py)*55%),
      rgba(255,255,255,.85) 4%, rgba(255,255,255,.13) 22%, rgba(0,0,0,.55) 120%);
    mix-blend-mode: overlay; opacity:.85;
  }
  .glitter{
    z-index:5;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.9) 0 .6px, transparent 1.4px),
      radial-gradient(circle at 70% 60%, rgba(255,240,200,.9) 0 .5px, transparent 1.3px),
      radial-gradient(circle at 45% 85%, rgba(200,240,255,.9) 0 .5px, transparent 1.2px);
    background-size: 3.1em 2.7em, 2.3em 3.3em, 3.7em 2.1em;
    background-position:
      calc(var(--px)*22px) calc(var(--py)*18px),
      calc(var(--px)*-14px) calc(var(--py)*26px),
      calc(var(--px)*30px) calc(var(--py)*-12px);
    mix-blend-mode: color-dodge;
    opacity: calc(.25 + .5 * var(--heat));
  }

  /* ─── plates ─── */
  .plate-top,.plate-name{
    position:absolute; left:0; right:0; text-align:center; z-index:6;
    color:transparent;
    background: linear-gradient(calc(100deg + var(--px)*60deg),
      var(--gold2), var(--gold3) 45%, var(--gold1) 55%, var(--gold2));
    -webkit-background-clip:text; background-clip:text;
  }
  .plate-top{
    top: 4.2%; font-size: clamp(8px, 2.6vw, 12px);
    letter-spacing:.42em; text-indent:.42em; text-transform:uppercase;
  }
  .plate-name{
    bottom: 8.8%; font-size: clamp(17px, 5.4vw, 26px);
    letter-spacing:.18em; text-indent:.18em; font-variant: small-caps;
  }
  .plate-sub{
    position:absolute; bottom:5.4%; left:17%; right:17%; text-align:center; z-index:6;
    font-size: clamp(7px, 2.1vw, 9px); letter-spacing:.12em; text-indent:.12em;
    color:rgba(246,226,122,.75); text-transform:uppercase;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .chain{
    position:fixed; bottom: max(10px, env(safe-area-inset-bottom)); left:0; right:0;
    text-align:center; font-size:10px; letter-spacing:.28em; text-indent:.28em;
    color:rgba(246,226,122,.4); text-transform:uppercase;
  }
  /* ─── gyro blessing (iOS permission gate) ─── */
  .bless{
    position:fixed; inset:0; z-index:50; display:none; place-items:center;
    background: rgba(6,3,10,.55); backdrop-filter: blur(3px);
    border:0; width:100%; color:var(--gold1); font: inherit;
    font-size:13px; letter-spacing:.38em; text-indent:.38em; text-transform:uppercase;
    cursor:pointer;
  }
  .bless.show{ display:grid; }
  @media (prefers-reduced-motion: reduce){
    .card{ transform:none; } .foil,.glitter{ opacity:.18; }
  }
</style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="card" id="card">
      <div class="bezel">
        <div class="art">{{ART}}</div>
        <div class="foil"></div>
        <div class="glare"></div>
        <div class="glitter"></div>
      </div>
      <span class="corner c-tl">{{CORNER_SVG}}</span>
      <span class="corner c-tr">{{CORNER_SVG}}</span>
      <span class="corner c-bl">{{CORNER_SVG}}</span>
      <span class="corner c-br">{{CORNER_SVG}}</span>
      <div class="plate-top">{{SEASON_TITLE}} · Season {{SEASON}}</div>
      <div class="plate-name">{{NAME}}</div>
      <div class="plate-sub">{{FLAVOR}} · №{{NUMBER}} of {{OF}}</div>
    </div>
  </div>
  <button class="bless" id="bless">✦ tap to activate the foil ✦</button>
  <div class="chain" id="chain"></div>

<script>
(() => {
  const root = document.documentElement, scene = document.getElementById('scene');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let tx = 0, ty = 0, px = 0, py = 0, lastInput = 0;

  const setVars = () => {
    root.style.setProperty('--px', px.toFixed(4));
    root.style.setProperty('--py', py.toFixed(4));
  };

  // desktop / touch-drag tilt
  scene.addEventListener('pointermove', e => {
    const r = scene.getBoundingClientRect();
    tx = ((e.clientX - r.left) / r.width) * 2 - 1;
    ty = ((e.clientY - r.top) / r.height) * 2 - 1;
    lastInput = performance.now();
  });
  scene.addEventListener('pointerleave', () => { lastInput = 0; });

  // gyroscope tilt (mobile). Two paths on purpose: inside marketplace iframes,
  // iOS WebKit blocks deviceorientation unless the embedder allows magnetometer
  // (which allow-lists rarely include), while devicemotion needs only
  // gyroscope+accelerometer — so we request both and fall back to motion-derived tilt.
  const clamp = v => Math.max(-1, Math.min(1, v));
  let orientAlive = false;
  const onOrient = e => {
    if (e.gamma == null) return;
    orientAlive = true;
    tx = clamp(e.gamma / 28);
    ty = clamp((e.beta - 45) / 28);
    lastInput = performance.now();
  };
  const onMotion = e => {
    if (orientAlive) return;
    const g = e.accelerationIncludingGravity;
    if (!g || g.x == null) return;
    tx = clamp(-g.x / 4.5);
    ty = clamp(-(g.y + 5.5) / 4.5);
    lastInput = performance.now();
  };
  const listen = () => {
    addEventListener('deviceorientation', onOrient);
    addEventListener('devicemotion', onMotion);
  };
  const ask = async C => {
    try {
      if (C && typeof C.requestPermission === 'function')
        return await C.requestPermission() === 'granted';
    } catch {}
    return false;
  };
  const bless = document.getElementById('bless');
  const needsGesture =
    (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') ||
    (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function');
  if (needsGesture) {
    if ('ontouchstart' in window) bless.classList.add('show');
    bless.addEventListener('click', async () => {
      const o = await ask(typeof DeviceOrientationEvent !== 'undefined' ? DeviceOrientationEvent : null);
      const m = await ask(typeof DeviceMotionEvent !== 'undefined' ? DeviceMotionEvent : null);
      if (o || m) listen();
      bless.classList.remove('show');
    });
  } else if (typeof DeviceOrientationEvent !== 'undefined' || typeof DeviceMotionEvent !== 'undefined') {
    listen();
  }

  // idle drift so the card is alive untouched
  const loop = t => {
    if (!reduced) {
      const idle = !lastInput || (t - lastInput > 2600);
      const gx = idle ? Math.sin(t / 2400) * .45 : tx;
      const gy = idle ? Math.cos(t / 3100) * .35 : ty;
      px += (gx - px) * .06; py += (gy - py) * .06;
      setVars();
    }
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);

  // ethereum breath — gas → foil heat, block → glitter reseed (fails silent offline)
  const RPCS = ['https://eth.llamarpc.com', 'https://cloudflare-eth.com'];
  const rpc = async method => {
    for (const url of RPCS) {
      try {
        const r = await fetch(url, { method:'POST',
          headers: {'content-type':'application/json'},
          body: JSON.stringify({ jsonrpc:'2.0', id:1, method, params: [] }) });
        const j = await r.json();
        if (j.result) return parseInt(j.result, 16);
      } catch {}
    }
    return null;
  };
  const chainEl = document.getElementById('chain');
  const breathe = async () => {
    const [gas, block] = [await rpc('eth_gasPrice'), await rpc('eth_blockNumber')];
    if (gas != null) {
      const gwei = gas / 1e9;
      root.style.setProperty('--heat', Math.max(.12, Math.min(1, gwei / 25)).toFixed(3));
    }
    if (block != null)
      chainEl.textContent = '⛓ block ' + block.toLocaleString('en-US');
  };
  breathe(); setInterval(breathe, 45000);
})();
</script>
</body>
</html>
